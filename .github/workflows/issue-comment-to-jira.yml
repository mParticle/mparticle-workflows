
name: "Create Jira Comment"

on:
  workflow_call:
  issue_comment:
    types: ["created"]

jobs:
  issue-commented:
    name: "Comment Issue"
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - name: "Checkout Branch"
        uses: actions/checkout@v4

      - name: "Login"
        uses: atlassian/gajira-login@ca13f8850ea309cf44a6e4e0c49d9aa48ac3ca4c # v3

      - name: "Get Issue"
        id: get
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'get-issue'

      - name: "Log created issue"
        run: echo "${{ steps.get.outputs.issue-labels }}"   
        
      - name: Find in commit messages
        id: find
        uses: atlassian/gajira-find-issue-key@7d9cbdfce900a0fcf608050ce728620a928be8b6 # v3
        with:
          string: ${{ steps.get.outputs.issue-labels }}  
          
      - name: "Log found issue"
        run: |
          echo "${{ steps.find.outputs.issue }}"  
          echo "${{ github.event.issue }}"  
        
      - name: "Create comment"
        uses: atlassian/gajira-comment@76589d6b6d0b94b1ca6b01171c01a6affb5d6701 # v3
        with:
          issue: ${{ steps.find.outputs.issue }}
          comment: ${{ github.event.comment.body }}
